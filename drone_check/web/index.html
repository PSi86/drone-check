<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>drone-check</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #1a1d24; --muted: #8b93a7; --text: #e6e9ef;
      --green: #1f9d55; --green-bg: #0e3b22; --red: #d23b3b; --red-bg: #3b1010;
      --accent: #3b82f6; --line: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--text); }
    header { padding: 16px 24px; border-bottom: 1px solid var(--line);
             display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; margin: 0; }
    header nav { display: flex; gap: 14px; margin-left: 8px; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
    header nav a.active { color: var(--text); font-weight: 600; }
    header nav a:hover { color: var(--text); }
    header .status { margin-left: auto; color: var(--muted); font-size: 13px; }
    .demo-btn { background: var(--accent); color: #fff;
                border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
    .shutdown { background: var(--red-bg); color: #f3a0a0; border: 1px solid var(--red);
                border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
    .shutdown:hover { background: #4a1414; }
    .shutdown:disabled { opacity: .5; cursor: default; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px; }
    .card { background: var(--panel); border: 1px solid var(--line);
            border-radius: 10px; padding: 18px; }
    .card h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase;
               letter-spacing: .06em; color: var(--muted); }
    .verdict { grid-column: 1 / -1; text-align: center; padding: 28px;
               border-radius: 12px; font-size: 30px; font-weight: 700;
               background: var(--panel); border: 1px solid var(--line); }
    .verdict.pass { background: var(--green-bg); border-color: var(--green); color: #7ee2a8; }
    .verdict.fail { background: var(--red-bg); border-color: var(--red); color: #f3a0a0; }
    .verdict .sub { display:block; font-size: 14px; font-weight: 400;
                    color: var(--muted); margin-top: 8px; }
    .steps li { list-style: none; padding: 6px 0; display: flex; gap: 10px;
                align-items: center; border-bottom: 1px dashed var(--line); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--green); } .dot.run { background: var(--accent); }
    .dot.err { background: var(--red); }
    .rule { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px;
            display: flex; gap: 10px; align-items: baseline; }
    .rule.pass { background: #11271a; } .rule.fail { background: #2a1212; }
    .rule .tag { font-size: 11px; font-weight: 700; padding: 1px 6px;
                 border-radius: 4px; }
    .rule.pass .tag { background: var(--green); color: #fff; }
    .rule.fail .tag { background: var(--red); color: #fff; }
    .rule .why { color: var(--muted); font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    td { padding: 4px 0; } td.k { color: var(--muted); width: 42%; }
    .pilot { display:flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .pilot-prompt { color: var(--muted); font-size: 12px; }
    .pilot-row { display: flex; gap: 8px; }
    .pilot input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--line);
                   background: #0c0e12; color: var(--text); }
    .pilot button { background: var(--green); color:#fff; border:0; padding: 8px 14px;
                    border-radius: 6px; cursor: pointer; }
    .hidden { display: none !important; }
    code { color: #c7d2fe; }
    .verdict.error { background: #2a1e10; border-color: #b8791f; color: #f0c879; }
    .log { list-style: none; margin: 0; padding: 0; max-height: 320px; overflow-y: auto;
           font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12px; }
    .log li { display: flex; gap: 10px; padding: 3px 0; border-bottom: 1px solid var(--line); }
    .log .ts { color: var(--muted); white-space: nowrap; }
    .log .lvl { white-space: nowrap; text-transform: uppercase; font-weight: 700; width: 44px; }
    .log .msg { color: var(--text); word-break: break-word; }
    .log .info .lvl { color: var(--muted); }
    .log .ok   .lvl { color: var(--green); }
    .log .warn .lvl { color: #f0c879; }
    .log .error .lvl { color: var(--red); }
  </style>
</head>
<body>
  <header>
    <h1>drone-check</h1>
    <nav>
      <a href="/" class="active">Live</a>
      <a href="/logs">Logs</a>
    </nav>
    <span class="status" id="conn">connecting…</span>
    <button class="demo-btn hidden" id="demo">Run demo</button>
    <button class="shutdown" id="shutdownBtn" title="drone-check-Server beenden">Server beenden</button>
  </header>

  <main>
    <div class="verdict" id="verdict">Waiting for a drone…
      <span class="sub" id="verdictSub">Plug in a flight controller via USB.</span>
    </div>

    <div class="card">
      <h2>Capture</h2>
      <ul class="steps" id="steps"></ul>
      <div class="pilot hidden" id="pilotBox">
        <div class="pilot-prompt" id="pilotPrompt">
          Operator fallback pilot — used for the folder label only when the
          flight controller reports no pilot name. Captured data is never edited.
        </div>
        <div class="pilot-row">
          <input id="pilotName" placeholder="Fallback pilot name — press Enter to apply" />
          <button id="pilotSave">Apply</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Drone</h2>
      <table id="info"><tbody></tbody></table>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h2>Checks</h2>
      <div id="rules"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h2>Session log</h2>
      <ul class="log" id="log"></ul>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let LOG_MAX = 100;

    const STEP_LABELS = {
      identify: "Identify (MSP)", cli: "Read settings (CLI)",
      firmware_hash: "Firmware hash", evaluate: "Evaluate rules",
    };
    const stepEls = {};
    function setStep(step, status) {
      let li = stepEls[step];
      if (!li) {
        li = document.createElement("li");
        li.innerHTML = `<span class="dot"></span><span class="lbl">${STEP_LABELS[step] || step}</span>`;
        $("steps").appendChild(li);
        stepEls[step] = li;
      }
      const dot = li.querySelector(".dot");
      dot.className = "dot " + (status === "ok" ? "ok" : status === "error" ? "err" : "run");
    }

    function resetCapture() {
      // Clear the live capture panels; the banner is set via setState().
      $("steps").innerHTML = ""; for (const k in stepEls) delete stepEls[k];
      $("rules").innerHTML = ""; $("info").querySelector("tbody").innerHTML = "";
    }

    function renderInfo(snap) {
      const fw = snap.firmware, vtx = snap.vtx;
      const rows = [
        ["Pilot Name", snap.pilot_name || "—"],
        ["Craft Name", snap.craft_name || "—"],
        ["FC serial", snap.uid],
        ["Firmware", `${fw.firmware_name} ${fw.version} (${fw.variant})`],
        ["Target / board", `${fw.target} / ${fw.board_name}`],
        ["Git hash", fw.git_hash],
        ["Hash approved", `${snap.firmware_hash_approved} (${snap.firmware_hash_source})`],
        ["VTX armed max", `${vtx.power_armed_max_mw} mW`],
        ["VTX disarmed", `${vtx.power_disarmed_mw} mW`],
        ["Low power on disarm", vtx.low_power_disarm],
        ["Power switches", vtx.switches.length],
      ];
      $("info").querySelector("tbody").innerHTML = rows
        .map(([k, v]) => `<tr><td class="k">${k}</td><td>${v}</td></tr>`).join("");
    }

    function renderRules(ev) {
      $("rules").innerHTML = ev.results.map(r => `
        <div class="rule ${r.passed ? "pass" : "fail"}">
          <span class="tag">${r.passed ? "PASS" : "FAIL"}</span>
          <div><div><code>${r.rule_id}</code> — ${r.description}</div>
          ${(!r.passed && r.detail) ? `<div class="why">${r.detail}</div>` : ""}</div>
          <span class="why" style="margin-left:auto">${r.severity}</span>
        </div>`).join("");
    }

    // --- ONE source of truth for the current state ---
    // The header (top-left) and the big badge are two renderings of the same
    // state, so they can never contradict each other.
    const STATES = {
      waiting:   { cls: "",      title: "Waiting for a drone…", sub: "Plug in a flight controller via USB.", header: "Ready — waiting for a drone" },
      settling:  { cls: "",      title: "Drone detected",       sub: "Verifying stable connection…",         header: "Detected — settling" },
      capturing: { cls: "",      title: "Capturing…",           sub: "Reading the flight controller…",       header: "Capturing" },
      pass:      { cls: "pass",  title: "PASS ✓",               sub: "All critical checks passed.",          header: "PASS" },
      fail:      { cls: "fail",  title: "FAIL ✗",               sub: "One or more critical checks failed.",  header: "FAIL" },
      error:     { cls: "error", title: "Error",                sub: "capture error",                        header: "Error" },
    };
    let settleTimer = null;
    function clearSettle() { if (settleTimer) { clearInterval(settleTimer); settleTimer = null; } }
    function setStatus(text) { $("conn").textContent = text; }
    function setState(kind, opts = {}) {
      clearSettle();  // any state change cancels a running settle countdown
      const s = STATES[kind] || STATES.waiting;
      const v = $("verdict");
      v.className = "verdict " + s.cls;
      v.firstChild.textContent = s.title;
      $("verdictSub").textContent = opts.sub || s.sub;
      setStatus(opts.header || s.header);
    }

    // --- session log (newest first, capped to LOG_MAX) ---
    function logRow(entry) {
      const li = document.createElement("li");
      li.className = entry.level || "info";
      li.innerHTML = `<span class="ts">${entry.ts || ""}</span>` +
        `<span class="lvl">${entry.level || "info"}</span>` +
        `<span class="msg"></span>`;
      li.querySelector(".msg").textContent = entry.message || "";
      return li;
    }
    function addLog(entry) {
      const list = $("log");
      list.insertBefore(logRow(entry), list.firstChild);
      while (list.children.length > LOG_MAX) list.removeChild(list.lastChild);
    }
    function setLog(entries) {
      $("log").innerHTML = "";
      (entries || []).forEach(addLog);  // oldest..newest -> prepended -> newest first
    }

    function handle(evt) {
      switch (evt.type) {
        case "config":
          if (evt.log_list_length) LOG_MAX = evt.log_list_length;
          // The captured logs are immutable; the field is only an operator
          // fallback for the folder label, shown when enabled in config.
          if (evt.allow_manual_pilot) $("pilotBox").classList.remove("hidden");
          else $("pilotBox").classList.add("hidden");
          // The "Run demo" button is only meaningful when serve was started with
          // --demo (no USB watcher); otherwise hide it.
          $("demo").classList.toggle("hidden", !evt.demo);
          break;
        case "log_batch": setLog(evt.entries); break;
        case "log": addLog(evt.entry); break;
        case "ready":
          // Authoritative "current state": always recover to a clear ready view,
          // even after an error or an unstable connection.
          setState("waiting");
          break;
        case "detected": {
          resetCapture();
          const port = evt.port || "?";
          let n = Math.round(evt.settle || 3);
          const tick = () => setState("settling", {
            header: "Detected " + port + " — settling…",
            sub: "Verifying stable connection… " + n + " s"
              + (evt.description ? "  ·  " + evt.description : ""),
          });
          tick();
          settleTimer = setInterval(() => {
            n -= 1;
            if (n <= 0) { clearSettle(); return; }
            $("verdictSub").textContent = "Verifying stable connection… " + n + " s"
              + (evt.description ? "  ·  " + evt.description : "");
          }, 1000);
          break;
        }
        case "capturing":
          setState("capturing", { header: "Capturing — " + (evt.port || "?") });
          break;
        case "step": setStep(evt.step, evt.status); break;
        case "verdict":
          renderInfo(evt.snapshot); renderRules(evt.evaluation);
          setState(evt.passed ? "pass" : "fail", {
            header: (evt.passed ? "PASS" : "FAIL") + (evt.path ? " — " + evt.path : ""),
          });
          break;
        case "disconnected":
          // History only (it is in the session log); never override the badge,
          // so the header and the badge always agree.
          break;
        case "error":
          setState("error", {
            sub: evt.message || "capture error",
            header: "Error — remove the drone; the tool stays ready",
          });
          break;
      }
    }

    function connect() {
      const ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/ws");
      ws.onopen = () => { setStatus("connected"); setInterval(() => ws.readyState === 1 && ws.send("ping"), 15000); };
      ws.onmessage = (m) => handle(JSON.parse(m.data));
      ws.onclose = () => { setStatus("disconnected from server — retrying…"); setTimeout(connect, 2000); };
    }
    connect();

    async function applyOperatorPilot() {
      const name = $("pilotName").value.trim();
      const r = await fetch("/api/operator-pilot", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }) });
      const data = await r.json().catch(() => ({}));
      $("pilotPrompt").textContent = data.ok
        ? (name ? `Fallback pilot set to '${name}' (folder label only).` : "Fallback pilot cleared.")
        : "Manual pilot entry is disabled in config.";
    }
    $("pilotSave").onclick = applyOperatorPilot;
    $("pilotName").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); applyOperatorPilot(); } });
    $("demo").onclick = () => fetch("/api/demo", { method: "POST" });

    async function shutdownServer() {
      if (!confirm("drone-check-Server wirklich beenden?")) return;
      const btn = $("shutdownBtn");
      btn.disabled = true; btn.textContent = "Beende…";
      try { await fetch("/api/shutdown", { method: "POST" }); } catch (e) {}
      document.body.innerHTML =
        '<p style="padding:24px;font-size:16px">drone-check wurde beendet. '
        + 'Du kannst dieses Fenster schließen.</p>';
    }
    $("shutdownBtn").onclick = shutdownServer;
  </script>
</body>
</html>
