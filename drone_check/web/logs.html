<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>drone-check — logs</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #1a1d24; --muted: #8b93a7; --text: #e6e9ef;
      --green: #1f9d55; --green-bg: #0e3b22; --red: #d23b3b; --red-bg: #3b1010;
      --accent: #3b82f6; --line: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--text); }
    header { padding: 16px 24px; border-bottom: 1px solid var(--line);
             display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; margin: 0; }
    header nav { display: flex; gap: 14px; margin-left: 8px; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
    header nav a.active { color: var(--text); font-weight: 600; }
    header nav a:hover { color: var(--text); }
    header .count { margin-left: auto; color: var(--muted); font-size: 13px; }
    header .shutdown { background: #2a1212; color: #f3a0a0; border: 1px solid var(--red);
      border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    header .shutdown:hover { background: #3a1818; }
    header .shutdown:disabled { opacity: .5; cursor: default; }
    main { padding: 24px; }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .filters input[type=search], .filters select {
      padding: 9px 12px; border-radius: 6px; border: 1px solid var(--line);
      background: #0c0e12; color: var(--text); font-size: 14px; }
    .filters input[type=search] { flex: 1; min-width: 220px; }
    .filters button { background: var(--panel); color: var(--text);
      border: 1px solid var(--line); padding: 9px 14px; border-radius: 6px; cursor: pointer; }
    .filters button:hover { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em; font-size: 11px;
      padding: 8px 10px; border-bottom: 1px solid var(--line); }
    tbody td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tbody tr:hover { background: #161922; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; }
    .badge.pass { background: var(--green); color: #fff; }
    .badge.fail { background: var(--red); color: #fff; }
    .badge.unknown { background: #3a3f4b; color: var(--muted); }
    .ts { font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
          color: var(--muted); white-space: nowrap; }
    .name { font-weight: 600; }
    .sub { color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 8px; white-space: nowrap; }
    .actions button { background: var(--panel); color: var(--text);
      border: 1px solid var(--line); padding: 6px 10px; border-radius: 6px;
      cursor: pointer; font-size: 12px; }
    .actions button:hover:not(:disabled) { border-color: var(--accent); }
    .actions button:disabled { opacity: .45; cursor: not-allowed; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    /* Must win over component rules like `.sitl { display: flex }` that are
       declared later with equal specificity — otherwise hidden elements
       (the SITL footer bar, its sub-parts) never actually hide. */
    .hidden { display: none !important; }
    code { color: #c7d2fe; }
    .sitl { position: fixed; left: 0; right: 0; bottom: 0; background: var(--panel);
            border-top: 1px solid var(--accent); padding: 14px 24px; display: flex;
            align-items: center; gap: 16px; flex-wrap: wrap; }
    .sitl .grow { flex: 1; min-width: 240px; }
    .sitl .title { font-weight: 600; }
    .sitl .url { font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
                 background: #0c0e12; border: 1px solid var(--line); border-radius: 6px;
                 padding: 4px 8px; user-select: all; }
    .sitl .note { color: #f0c879; font-size: 12px; margin-top: 4px; }
    .sitl a.cfg-link { color: #fff; background: var(--accent); text-decoration: none;
                       padding: 8px 14px; border-radius: 6px; }
    .sitl button { background: #2a1212; color: #f3a0a0; border: 1px solid var(--red);
                   padding: 8px 14px; border-radius: 6px; cursor: pointer; }
    .sitl button:disabled { opacity: .5; cursor: default; }
    .bar { margin-top: 8px; height: 6px; border-radius: 3px; background: #0c0e12;
           border: 1px solid var(--line); overflow: hidden; max-width: 420px; }
    .bar .fill { height: 100%; width: 0; background: var(--accent); transition: width .2s; }
    .bar.indet .fill { width: 35%; animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
    .busy { opacity: .6; pointer-events: none; }
  </style>
</head>
<body>
  <header>
    <h1>drone-check</h1>
    <nav>
      <a href="/">Live</a>
      <a href="/logs" class="active">Logs</a>
    </nav>
    <span class="count" id="count"></span>
    <button id="shutdownBtn" class="shutdown" title="drone-check-Server beenden">Server beenden</button>
  </header>

  <main>
    <div class="filters">
      <input type="search" id="q" placeholder="Suche: Pilot, Craft, UID, Version, Ordner…" />
      <select id="verdict">
        <option value="all">Alle Ergebnisse</option>
        <option value="pass">Bestanden (PASS)</option>
        <option value="fail">Durchgefallen (FAIL)</option>
        <option value="unknown">Ohne Ergebnis</option>
      </select>
      <select id="variant"><option value="all">Alle Firmware</option></select>
      <button id="refresh">Aktualisieren</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Ergebnis</th><th>Zeitpunkt</th><th>Pilot / Craft</th>
          <th>Firmware</th><th>Hash</th><th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty hidden" id="empty">Keine Logs gefunden.</div>
  </main>

  <div class="sitl hidden" id="sitlBar">
    <div class="grow">
      <div class="title" id="sitlTitle"></div>
      <div class="note" id="sitlNote">SITL hat keine echten Motor-Ausgänge: Motor-/Mixer-Tabs
        zeigen Warnungen (erwartet, ohne Einfluss auf die Inspektion). VTX-Tabelle wird angezeigt.</div>
      <div class="bar hidden" id="sitlProg"><div class="fill" id="sitlProgFill"></div></div>
    </div>
    <div id="sitlConnect" class="hidden">Verbinden im Configurator (Manual):
      <span class="url" id="sitlUrl"></span></div>
    <a class="cfg-link hidden" id="sitlOpen" href="https://app.betaflight.com/" target="_blank" rel="noopener">Configurator öffnen</a>
    <button id="sitlStop">Abbrechen</button>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let CAPTURES = [];
    // One "View in Configurator" button. Which backend serves it (SITL or the
    // read-only bf-configd) is decided in config (settings.viewer_backend) and
    // reported by /api/viewer — never chosen in the UI. Default: bf-configd.
    let VIEWER_ENABLED = false;
    let activeBackend = "bfcd";
    const BACKENDS = {
      sitl: {
        label: "SITL",
        start: (id) => `/api/captures/${encodeURIComponent(id)}/configurator`,
        status: "/api/sitl/status", stop: "/api/sitl/stop",
        note: "SITL hat keine echten Motor-Ausgänge: Motor-/Mixer-Tabs zeigen "
            + "Warnungen (erwartet, ohne Einfluss auf die Inspektion). VTX-Tabelle wird angezeigt.",
      },
      bfcd: {
        label: "bf-configd",
        start: (id) => `/api/captures/${encodeURIComponent(id)}/bfcd`,
        status: "/api/bfcd/status", stop: "/api/bfcd/stop",
        note: "bf-configd ist read-only: jeder Schreibzugriff wird von der Firmware "
            + "abgelehnt — der Configurator kann alles ansehen, aber nichts ändern. "
            + "Motor-/Mixer-Tabs zeigen Warnungen (erwartet).",
      },
    };

    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g,
      (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    function verdictKind(c) {
      if (c.verdict === true) return "pass";
      if (c.verdict === false) return "fail";
      return "unknown";
    }
    function verdictBadge(c) {
      const k = verdictKind(c);
      const txt = k === "pass" ? "PASS" : k === "fail" ? "FAIL" : "—";
      return `<span class="badge ${k}">${txt}</span>`;
    }

    function matches(c) {
      const term = $("q").value.trim().toLowerCase();
      if (term) {
        const hay = [c.pilot_name, c.craft_name, c.uid,
          c.firmware && c.firmware.version, c.id]
          .map((x) => (x || "").toLowerCase()).join(" ");
        if (!hay.includes(term)) return false;
      }
      const v = $("verdict").value;
      if (v !== "all" && verdictKind(c) !== v) return false;
      const fv = $("variant").value;
      if (fv !== "all" && (c.firmware && c.firmware.variant) !== fv) return false;
      return true;
    }

    function row(c) {
      const fw = c.firmware || {};
      const fwTxt = [fw.variant, fw.version].filter(Boolean).join(" ") || "—";
      const git = fw.git_hash ? `<div class="sub"><code>${esc(fw.git_hash)}</code></div>` : "";
      const hash = c.firmware_hash_approved === true ? "✓ approved"
        : c.firmware_hash_approved === false ? "✗ not approved" : "—";
      const hashSrc = c.firmware_hash_source ? ` <span class="sub">(${esc(c.firmware_hash_source)})</span>` : "";
      const warn = c.readable === false ? ' <span class="sub">⚠ unlesbar</span>' : "";
      const ver = esc((c.firmware || {}).version || "");
      const viewBtn = (VIEWER_ENABLED && c.has_dump)
        ? `<button data-view="${esc(c.id)}" data-ver="${ver}">Im Configurator</button>` : "";
      return `<tr>
        <td>${verdictBadge(c)}</td>
        <td class="ts">${esc(c.captured_at || c.id)}</td>
        <td><div class="name">${esc(c.pilot_name || "—")} / ${esc(c.craft_name || "—")}</div>
            <div class="sub">${esc(c.uid || "")}${warn}</div></td>
        <td>${esc(fwTxt)}${git}</td>
        <td>${hash}${hashSrc}</td>
        <td><div class="actions">
          <button data-open="${esc(c.id)}">Ordner öffnen</button>${viewBtn}
        </div></td>
      </tr>`;
    }

    function render() {
      const shown = CAPTURES.filter(matches);
      $("rows").innerHTML = shown.map(row).join("");
      $("empty").classList.toggle("hidden", shown.length > 0);
      $("count").textContent = `${shown.length} / ${CAPTURES.length} Logs`;
      $("rows").querySelectorAll("button[data-open]").forEach((b) => {
        b.onclick = () => openFolder(b.getAttribute("data-open"), b);
      });
      $("rows").querySelectorAll("button[data-view]").forEach((b) => {
        b.onclick = () => openViewer(
          b.getAttribute("data-view"), b.getAttribute("data-ver"), b, activeBackend);
      });
    }

    function fillVariants() {
      const variants = [...new Set(CAPTURES
        .map((c) => c.firmware && c.firmware.variant).filter(Boolean))].sort();
      const sel = $("variant");
      sel.innerHTML = '<option value="all">Alle Firmware</option>'
        + variants.map((v) => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
    }

    async function openFolder(id, btn) {
      btn.disabled = true;
      try {
        const r = await fetch(`/api/captures/${encodeURIComponent(id)}/open-folder`, { method: "POST" });
        if (!r.ok) { const d = await r.json().catch(() => ({})); alert("Konnte Ordner nicht öffnen: " + (d.reason || r.status)); }
      } finally { btn.disabled = false; }
    }

    const PHASE_LABELS = {
      checking: "Prüfe Umgebung & Binary…",
      starting: "Starte (Ladephase)…",
      loading: "Lade Konfiguration",
      saving: "Speichere & starte neu…",
      starting2: "Starte aus gespeicherter Konfiguration…",
      proxy: "Starte Configurator-Proxy…",
      ready: "Bereit",
    };
    let viewerPoll = null;

    // One shared footer bar renders whichever backend (SITL or bf-configd) is
    // active; the label/note come from the BACKENDS config.
    function renderViewer(st, backend) {
      backend = backend || activeBackend;
      const cfg = BACKENDS[backend] || {};
      const label = cfg.label || "Backend";
      const bar = $("sitlBar"), prog = $("sitlProg"), fill = $("sitlProgFill"), stop = $("sitlStop");
      if (st && st.running) {
        stopPolling();
        $("sitlTitle").textContent = `${label} läuft — Firmware ${st.version || "?"}`
          + (st.capture_id ? `  ·  ${st.capture_id}` : "");
        $("sitlUrl").textContent = st.connect_url || "";
        $("sitlNote").textContent = cfg.note || "";
        $("sitlConnect").classList.remove("hidden");
        $("sitlOpen").classList.remove("hidden");
        $("sitlNote").classList.remove("hidden");
        prog.classList.add("hidden");
        stop.textContent = `${label} stoppen`; stop.disabled = false;
        bar.classList.remove("hidden");
      } else if (st && st.stopping) {
        // Local-only transient while we wait for the stop request to return.
        $("sitlTitle").textContent = `Stoppe ${label}…`;
        $("sitlConnect").classList.add("hidden");
        $("sitlOpen").classList.add("hidden");
        $("sitlNote").classList.add("hidden");
        prog.classList.remove("hidden"); prog.classList.add("indet"); fill.style.width = "";
        stop.textContent = "Stoppe…"; stop.disabled = true;
        bar.classList.remove("hidden");
      } else if (st && st.starting) {
        let lbl = PHASE_LABELS[st.phase] || `Starte ${label}…`;
        if (st.phase === "loading" && st.total) lbl += ` ${st.sent}/${st.total}`;
        // Name the backend + capture so it is clear what "Abbrechen" would cancel.
        $("sitlTitle").textContent = `${label}` + (st.capture_id ? ` · ${st.capture_id}` : "") + " — " + lbl;
        $("sitlConnect").classList.add("hidden");
        $("sitlOpen").classList.add("hidden");
        $("sitlNote").classList.add("hidden");
        prog.classList.remove("hidden");
        if (st.phase === "loading" && st.total) {
          prog.classList.remove("indet");
          fill.style.width = Math.round(100 * st.sent / st.total) + "%";
        } else {
          prog.classList.add("indet"); fill.style.width = "";
        }
        stop.textContent = "Start abbrechen"; stop.disabled = false;
        bar.classList.remove("hidden");
      } else {
        stopPolling();
        bar.classList.add("hidden");
      }
    }

    function startPolling(backend) {
      if (viewerPoll) return;
      const url = (BACKENDS[backend] || BACKENDS[activeBackend]).status;
      viewerPoll = setInterval(async () => {
        try {
          const st = await (await fetch(url)).json();
          if (st.running || st.starting) renderViewer(st, backend);
        } catch (e) {}
      }, 400);
    }
    function stopPolling() { if (viewerPoll) { clearInterval(viewerPoll); viewerPoll = null; } }

    // Epoch guard: a stop() (or a new open) bumps this so a slow, now-obsolete
    // start response can't re-show the bar after the user already stopped.
    let viewerEpoch = 0;

    async function openViewer(id, ver, btn, backend) {
      const cfg = BACKENDS[backend];
      if (!cfg) return;
      // SITL and bf-configd share a TCP port, so stop the other one first.
      const other = backend === "sitl" ? "bfcd" : "sitl";
      try { await fetch(BACKENDS[other].stop, { method: "POST" }); } catch (e) {}
      activeBackend = backend;
      const prev = btn.textContent;
      const epoch = ++viewerEpoch;
      btn.disabled = true; btn.textContent = `Starte ${cfg.label}…`;
      renderViewer({ starting: true, phase: "checking", capture_id: id }, backend);
      startPolling(backend);
      try {
        const r = await fetch(cfg.start(id), { method: "POST" });
        const d = await r.json().catch(() => ({}));
        if (epoch !== viewerEpoch) return;  // superseded by a stop / newer open
        stopPolling();
        if (d.ok) {
          // The start POST only returns once the backend is verified reachable,
          // so reflect the real backend status rather than assuming "running".
          let st = null;
          try { st = await (await fetch(cfg.status)).json(); } catch (e) {}
          renderViewer((st && (st.running || st.starting)) ? st
            : { running: true, version: d.version || ver, capture_id: id, connect_url: d.connect_url },
            backend);
        } else if (d.cancelled) {
          renderViewer({ running: false }, backend);  // we asked it to stop — no error
        } else {
          renderViewer({ running: false }, backend);
          const tip = backend === "bfcd"
            ? "\n\nTipp: „Im Configurator“ (SITL) funktioniert auch für Dumps, die bf-configd (noch) nicht unterstützt." : "";
          alert(`${cfg.label} konnte nicht gestartet werden:\n` + (d.reason || r.status) + tip);
        }
      } catch (e) {
        if (epoch !== viewerEpoch) return;
        stopPolling(); renderViewer({ running: false }, backend);
        alert(`Fehler beim Starten von ${cfg.label}: ` + e);
      } finally {
        btn.disabled = false; btn.textContent = prev;
      }
    }

    async function stopViewer() {
      viewerEpoch++;  // invalidate any in-flight open response
      stopPolling();
      const cfg = BACKENDS[activeBackend];
      renderViewer({ stopping: true }, activeBackend);
      // Keep showing "Stoppe…" until the backend status *genuinely* reports it
      // is down — never hide the bar optimistically while teardown is running.
      const done = fetch(cfg.stop, { method: "POST" }).catch(() => {});
      for (let i = 0; i < 80; i++) {  // up to ~12s, then give up
        let st = null;
        try { st = await (await fetch(cfg.status)).json(); } catch (e) {}
        if (st && !st.running && !st.starting) {
          renderViewer(st, activeBackend);  // idle -> bar hides
          await done;
          return;
        }
        renderViewer({ stopping: true }, activeBackend);
        await new Promise((r) => setTimeout(r, 150));
      }
      await done;
      renderViewer({ running: false }, activeBackend);
    }
    $("sitlStop").onclick = stopViewer;

    async function load() {
      const r = await fetch("/api/captures");
      const data = await r.json().catch(() => ({ captures: [] }));
      CAPTURES = data.captures || [];
      // Learn which backend config selected (and whether it is available, and
      // any already-running session) BEFORE rendering — the one button is only
      // shown when the configured backend is on.
      let st = null;
      try { st = await (await fetch("/api/viewer")).json(); } catch (e) {}
      if (st) {
        activeBackend = st.backend || activeBackend;
        VIEWER_ENABLED = !!st.enabled;
      }
      fillVariants();
      render();
      if (st && (st.running || st.starting)) {
        renderViewer(st, activeBackend);
        if (st.starting) startPolling(activeBackend);
      }
    }

    async function shutdownServer() {
      if (!confirm("drone-check-Server wirklich beenden?")) return;
      const btn = $("shutdownBtn");
      btn.disabled = true; btn.textContent = "Beende…";
      try { await fetch("/api/shutdown", { method: "POST" }); } catch (e) {}
      document.body.innerHTML =
        '<p style="padding:24px;font-size:16px">drone-check wurde beendet. '
        + 'Du kannst dieses Fenster schließen.</p>';
    }

    $("q").addEventListener("input", render);
    $("verdict").addEventListener("change", render);
    $("variant").addEventListener("change", render);
    $("refresh").onclick = load;
    $("shutdownBtn").onclick = shutdownServer;
    load();
  </script>
</body>
</html>
