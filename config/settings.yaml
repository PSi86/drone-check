# drone-check runtime settings

# Where capture folders are written.
log_dir: logs

# Capture folder name. Each capture is written once and never modified or moved.
# Placeholders: {timestamp} {pilot_name} {craft_name} {uid} {variant} {version}.
# pilot_name and craft_name are read from the flight controller.
folder_template: "{timestamp}_{pilot_name}_{craft_name}"

# Manual pilot entry. OFF by default: the pilot name comes from the FC and the
# captured data files are never edited. When true, the operator may supply a
# fallback pilot name used ONLY for the folder label when the FC reports none.
allow_manual_pilot: false

# USB CDC virtual serial: the baud rate is nominal and largely ignored, but some
# drivers want a sane value.
serial_baudrate: 115200

# Seconds between USB hot-plug polls.
poll_interval: 1.0

# Serial / CLI timing. Increase the idle/max values for slow links if a capture
# reports an incomplete response.
connect_delay: 0.3        # settle time after opening the port
cli_idle_timeout: 1.5     # end a read after this gap with no bytes
cli_max_wait: 45.0        # absolute cap per CLI command (dump all is large)

# USB hot-plug debounce (absorbs cable wiggle / re-enumeration). A port must be
# present this long before reading, and absent this long before "ready".
connect_debounce: 3.0
disconnect_debounce: 3.0

# If a capture fails while the drone stays plugged in, retry this many extra
# times before giving up (then the drone must be unplugged and replugged to try
# again). Prevents an unreadable drone from retrying in a tight loop forever.
capture_max_retries: 2

# Set a directory to record raw serial traffic for every capture (debugging).
# debug_dir: debug

# Session application log (USB/COM actions, warnings, errors, successes): how
# many recent entries the web UI keeps and shows (newest first).
log_list_length: 100

# CLI commands captured during the text-CLI phase, in order.
#   `dump all` -> authoritative source: every setting with its absolute value,
#                 so rule evaluation never has to guess defaults.
#   `diff all` -> the community-standard portable/human backup. OPTIONAL: it is
#                 NOT captured by default. Add it to the list to also store it.
cli_commands:
  - version
  - dump all
  - status

# Only `dump all`/`dump` is parsed by default. Enable this only if you feed
# `diff all`/`diff` captures (with no dump present) to the parser.
parse_diff_fallback: false

# Firmware-hash verification: approve if either enabled source approves.
firmware_hash:
  use_allowlist: true
  use_github: true

# "View in Configurator": load a stored capture into a version-matched Betaflight
# SITL (run under WSL) so the real web Configurator can connect and show exactly
# what the drone owner would see. SITL binaries are PRE-BUILT per firmware version
# with scripts/build_sitl.sh (inside WSL); drone-check only selects them. WSL is
# started on the first "View in Configurator" and stopped when drone-check exits
# (only if drone-check started it). The build patches VTX support in, so the
# vtxtable IS shown; only live VTX *device* control is inert (no real radio).
# drone-check's own dump analysis stays authoritative for VTX power either way.
sitl:
  enabled: true
  distro: Ubuntu              # WSL distro holding the SITL cache
  cache_dir: ~/.cache/drone-check/sitl
  run_dir: ~/.cache/drone-check/run
  tcp_port: 5761              # SITL UART1
  ws_port: 6761               # websockify endpoint (ws://127.0.0.1:6761)
  boot_timeout: 30.0
